{% extends "base.html" %}
{% block title %}Resultados{% endblock %}
{% block content %}
<h1>Resultados{% if q %}: «{{ q }}»{% endif %}</h1>
<ul>
    {% for t in tacos %}
    <li><a href="{{ url_for('tacos.detalle', taco_id=t.id) }}">{{ t.nombre }}</a> — {{ t.precio }} — {{ t.descripcion }}</li>
    {% else %}
    <li>Sin coincidencias.</li>
    {% endfor %}
</ul>
<p><a href="{{ url_for('tacos.index') }}">Volver</a></p>
{% endblock %}
