{% extends "base.html" %}
{% block title %}Detalle{% endblock %}
{% block content %}
{% if taco %}
<h1>{{ taco.nombre }}</h1>
<p>Precio: {{ taco.precio }}</p>
<p><a href="{{ url_for('tacos.editar', taco_id=taco.id) }}">Editar</a></p>
{% else %}
<p>Taco no encontrado.</p>
{% endif %}
<p><a href="{{ url_for('tacos.index') }}">Volver</a></p>
{% endblock %}
