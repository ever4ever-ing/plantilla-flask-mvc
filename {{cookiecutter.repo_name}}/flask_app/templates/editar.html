{% extends "base.html" %}
{% block title %}Editar · Tacos{% endblock %}
{% block content %}
{% if taco %}
<h1>Editar: {{ taco.nombre }}</h1>
<form method="post">
    <label>Nombre <input name="nombre" value="{{ taco.nombre }}" required></label>
    <label>Precio <input name="precio" type="number" step="0.01" min="0" value="{{ taco.precio }}" required></label>
    <button type="submit">Guardar</button>
</form>
{% else %}
<p>Taco no encontrado.</p>
{% endif %}
<p><a href="{{ url_for('tacos.index') }}">Volver</a></p>
{% endblock %}
