{% extends "base.html" %}
{% block title %}Nuevo taco{% endblock %}
{% block content %}
<h1>Agregar taco</h1>
<form method="post">
    <label>Nombre <input name="nombre" required></label>
    <label>Precio <input name="precio" type="number" step="0.01" min="0" value="0" required></label>
    <label>Descripción <input name="descripcion" required></label>
    <button type="submit">Guardar</button>
</form>
<p><a href="{{ url_for('tacos.index') }}">Volver</a></p>
{% endblock %}
